{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - UACM</title>
    <link rel="stylesheet" href="{% static 'css/reportes2.css' %}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/reportes.js' %}"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <img src="{% static 'media/logouacm.jpg' %}" alt="UACM Logo" class="logo">
            <a href="{% url 'home' %}" class="home-button">
              <img src="https://www.svgrepo.com/show/525383/home-1.svg" alt="Menú" class="home-icon">
          </a>
        </div>
        <div class="user-profile" id="userProfile">
          <span class="user-icon">👤</span>
          <span class="user-name">{{ user.username }}</span>
      </div>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h1>Reportes</h1>
            
            <form class="report-form">
                <div class="form-group">
                    <label for="tipo-reporte">Tipo de Reporte</label>
                    <select id="tipo-reporte" name="tipo-reporte" required>
                        <!--OPCIONES-->
                    </select>
                </div>

                <div class="date-container">
                    <div class="form-group">
                        <label for="fecha-inicio">Fecha de Inicio</label>
                        <input type="date" id="fecha-inicio" name="fecha-inicio" required>
                    </div>

                    <div class="form-group">
                        <label for="fecha-fin">Fecha de Fin</label>
                        <input type="date" id="fecha-fin" name="fecha-fin" required>
                    </div>
                </div>

                <button type="submit" class="generate-btn">Generar Reporte</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>"NADA HUMANO ME ES AJENO"</p>
    </footer>
</body>
</html>
