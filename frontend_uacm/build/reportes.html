{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - UACM</title>
    <link rel="stylesheet" href="{% static 'css/reportes2.css' %}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/reportes.js' %}"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <img src="{% static 'media/logouacm.jpg' %}" alt="UACM Logo" class="logo">
            <a href="{% url 'home' %}" class="home-button">
              <img src="https://www.svgrepo.com/show/525383/home-1.svg" alt="Menú" class="home-icon">
            </a>
        </div>
        <div class="user-profile" id="userProfile">
            <span class="user-icon">👤</span>
            <span class="user-name">{{ user.username }}</span>
        </div>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h1>Reportes</h1>
            
            <!-- Formulario corregido con la URL Django correcta -->
            <form method="POST" id="reporte-form" action="{% url 'generar_reporte'}">

                {% csrf_token %}
                
                <!-- Campos de fecha -->
                <label for="fecha_inicio">Fecha de Inicio:</label>
                <input type="date" id="fecha_inicio" name="fecha_inicio">
            
                <label for="fecha_fin">Fecha de Fin:</label>
                <input type="date" id="fecha_fin" name="fecha_fin" >
            
                <!-- Campo de formato -->
                <label for="formato">Formato:</label>
                <select id="formato" name="formato">
                    <option value="PDF">PDF</option>
                    <option value="Excel">Excel</option>
                </select>
            
                <button type="submit">Generar Reporte</button>
            </form>

            <!-- Sección para mostrar resultados -->
            <div id="resultados-container">
                <h2>Resultados del Reporte</h2>
                <table id="resultados-tabla">
                    <thead>
                        <tr>
                            <th>Columna 1</th>
                            <th>Columna 2</th>
                            <th>Columna 3</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aquí se llenarán los resultados con AJAX -->
                    </tbody>
                </table>
            </div>
            
        </div>
    </main>

    <footer class="footer">
        <p>"NADA HUMANO ME ES AJENO"</p>
    </footer>
</body>
</html>
