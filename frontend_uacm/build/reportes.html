{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - UACM</title>
    <link rel="icon" href="data:,">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS UNIFICADO -->
    <link rel="stylesheet" href="{% static 'css/reportes1.css' %}">

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<!-- =======================
     HEADER UNIFICADO
======================= -->
<header class="header">
    <div class="header-inner">

        <div class="header-left">
            <img src="{% static 'media/logouacm.jpg' %}" class="header-logo" alt="UACM">

            <a href="{% url 'home' %}" class="home-button">
                <i class="fas fa-home"></i>
            </a>

            <div class="header-titles">
                <h1>Reportes</h1>
                <p>Solicitudes e Inventarios</p>
            </div>
        </div>

        <div class="header-user">
            <span class="username">{{ user.username }}</span>
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
        </div>

    </div>
</header>

<!-- =======================
     CONTENIDO
======================= -->
<main class="main-content">

    <div class="content-wrapper">

        <!-- =======================
             REPORTES DE SOLICITUDES
        ======================= -->
        <section class="card">
            <h3>Reporte de Solicitudes</h3>

            <form id="reporte-form">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="form-group">
                        <label>Fecha inicio</label>
                        <input type="date" id="fecha_inicio" required>
                    </div>

                    <div class="form-group">
                        <label>Fecha fin</label>
                        <input type="date" id="fecha_fin" required>
                    </div>

                    <div class="form-group">
                        <label>Formato</label>
                        <select id="formato">
                            <option value="PDF">PDF</option>
                            <option value="CSV">CSV</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-chart-bar"></i> Generar reporte
                    </button>
                </div>
            </form>

            <!-- RESULTADOS -->
            <div id="resultados-container" style="display:none">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Almacén</th>
                            <th>Artículo</th>
                            <th>Cantidad</th>
                            <th>Solicitante</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="resultados-tabla"></tbody>
                </table>
            </div>
        </section>

        <!-- =======================
             INVENTARIO
        ======================= -->
        <section class="card">
            <h3>Inventario General</h3>

            <div class="form-actions">
                <button id="mostrar-inventario" class="btn btn-secondary">
                    <i class="fas fa-boxes"></i> Ver inventario
                </button>
            </div>

            <div id="inventario-container" style="display:none">
                <table>
                    <thead>
                        <tr>
                            <th>Artículo</th>
                            <th>Descripción</th>
                            <th>Cantidad</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody id="inventario-tabla"></tbody>
                </table>
            </div>
        </section>

    </div>
</main>

<footer class="footer">
    <p>"Nada Humano Me Es Ajeno"</p>
</footer>

</body>
</html>
