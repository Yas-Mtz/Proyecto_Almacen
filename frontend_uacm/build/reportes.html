{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - UACM</title>
    <link rel="stylesheet" href="{% static 'css/reportes2.css' %}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/reportes.js' %}"></script>
</head>
<body>
    <header class="header">
        
        <div class="header-left">
            <img src="{% static 'media/logouacm.jpg' %}" alt="UACM Logo" class="logo">
            <a href="{% url 'home' %}" class="home-button">
              <img src="https://www.svgrepo.com/show/525383/home-1.svg" alt="Menú" class="home-icon">
          </a>
        </div>
        <div class="user-profile" id="userProfile">
          <span class="user-icon">👤</span>
          <span class="user-name">{{ user.username }}</span>
      </div>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h1>Reportes</h1>
            
            <form method="POST" action="{% url 'generar_reporte' %}">
                {% csrf_token %}
                <label for="tipo-reporte">Tipo de Reporte:</label>
                <select id="tipo-reporte" name="tipo-reporte" required>
                    <option value="productos">Reporte de Productos</option>
                    <option value="inventario">Reporte de Inventario</option>
                </select>
            
                <label for="fecha-inicio">Fecha de Inicio:</label>
                <input type="date" id="fecha-inicio" name="fecha-inicio" required>
            
                <label for="fecha-fin">Fecha de Fin:</label>
                <input type="date" id="fecha-fin" name="fecha-fin" required>
            
                <label for="formato">Formato:</label>
                <select id="formato" name="formato">
                    <option value="PDF">PDF</option>
                    <option value="Excel">Excel</option>
                </select>
            
                <button type="submit">Generar Reporte</button>
            </form>
            
        </div>
    </main>

    <footer class="footer">
        <p>"NADA HUMANO ME ES AJENO"</p>
    </footer>
</body>
</html>
