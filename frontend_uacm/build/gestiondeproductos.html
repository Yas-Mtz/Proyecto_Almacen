{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Artículo</title>
    <link rel="stylesheet" href="{% static 'css/gestiondeproductos.css' %}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{% static 'js/gestiondeproductos.js' %}"></script>  <!-- Enlace al archivo JS -->
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h1 class="logo">UACM</h1>
            <a href="{% url 'home' %}" class="menu-item">
                <img src="home-icon.png" alt="Inicio">
                Inicio
            </a>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1 class="page-title">Agregar Artículo</h1>
                <div class="user-profile">
                    <span>Usuario 1</span>
                    <div class="user-icon"></div>
                </div>
            </header>

            <section class="form-container">
                <form method="post" enctype="multipart/form-data" class="article-form">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="id_articulo">ID del Artículo</label>
                        <input type="text" name="id_articulo" id="id_articulo" 
                               value="{{ form.id_articulo.value }}" required>
                    </div>

                    <div class="form-group">
                        <label for="nombre_articulo">Nombre del Artículo</label>
                        <input type="text" name="nombre_articulo" id="nombre_articulo" 
                               value="{{ form.nombre_articulo.value }}" required>
                    </div>

                    <div class="form-group">
                        <label for="id_descripcion_articulo">Descripción del Artículo</label>
                        <textarea name="descripcion_articulo" id="id_descripcion_articulo" 
                                  required>{{ form.descripcion_articulo.value }}</textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="id_cantidad_articulo">Cantidad</label>
                            <input type="number" name="cantidad_articulo" id="cantidad_articulo" 
                                   value="{{ form.cantidad_articulo.value }}" required>
                        </div>

                        <div class="form-group">
                            <label for="id_estatus">Estatus:</label>
                            <select name="id_estatus" id="id_estatus" required>
                                <option value="" disabled selected>Seleccione un estatus</option>  <!-- Opción por defecto -->
                                {% for estatus in estatus_list %}
                                <option value="{{ estatus.0 }}">{{ estatus.1 }}</option>
                                {% endfor %}
                            </select><br>
                        </div>
                    </div>
               
                    <div class="form-actions">
                        <button type="submit" class="btn-submit" id="btn-guardar">Guardar Artículo</button>
                        <button type="button" class="btn-clear" id="btn-limpiar">Limpiar Campos</button>  <!-- Botón para limpiar -->
                    </div>
                </form>

                {% if form.errors %}
                    <div class="error-container">
                        <ul class="error-list">
                            {% for field in form %}
                                {% for error in field.errors %}
                                    <li>{{ error }}</li>
                                {% endfor %}
                            {% endfor %}
                        </ul>
                    </div>
                {% endif %}
            </section>
        </main>
    </div>
</body>
</html>
