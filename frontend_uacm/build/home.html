{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario UACM</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
    <nav class="sidebar">
        <h1 class="logo">UACM</h1>
        
    </nav>

    <main class="main-content">

        <section class="welcome-card">
            <h2>Sistema de Inventario</h2>
            <div class="user-welcome">
                <div class="profile-circle">
                    <img src="{% static 'media/usuario.png' %}" >
                </div>
                <p>Bienvenido</p>
                <div class="user-profile">
                    <span>{{ user.get_full_name|default:user.username }}</span>
                    <div class="user-icon"></div>
                  </div>
            </div>
            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Cerrar sesión</button>
            </form>
            
        </section>

        <section class="menu-container">
            <a href="{% url 'gestiondeproductos' %}" class="menu-item">

                <div class="menu-icon green">
                    <i class="icon-gestion"></i>
                </div>
                <span>Gestión de Productos</span>
                
                <span class="arrow">→</span>
            </a>

            <a href="{% url 'reportes' %}" class="menu-item">
                <div class="menu-icon yellow">
                    <i class="icon-reportes"></i>
                </div>
                <span>Reportes e Inventario</span>
                <span class="arrow">→</span>
            </a>

            <a href="#" class="menu-item">
                <div class="menu-icon blue">
                    <i class="icon-solicitud"></i>
                </div>
                <span>Solicitud de Artículos</span>
                <span class="arrow">→</span>
            </a>
        </section>
    </main>
</body>
</html>
